################################################################################
# DO NOT EDIT THIS FILE while the server is running.
#
# WARNING: This entire mkdocs.yml file will be deleted. The original will be
# restored overwriting this file when the server shuts down.
#
# If you want to edit your mkdocs.yml, do so after shutting down the server.
################################################################################
site_name: Praktikos užduotys
plugins:
  - search
  - techdocs-core:
      use_material_search: true
      use_pymdownx_blocks: true
  - live-edit:
      user_docs_dir: /home/aleksandras/Documents/praktikosuzd/docs
      websockets_port: 8484
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
hooks:
  - /tmp/mkdocs-wysiwyg-1PLjcA/restore_theme.py
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: "!!python/name:pymdownx.superfences.fence_code_format"
